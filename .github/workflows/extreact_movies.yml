name: Extract Movies

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  run-extractor:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests playwright
        playwright install chromium --with-deps
        
    - name: Run extract_movies.py
      run: |
        # Testing the script to ensure it runs correctly without local captures
        python extract_movies.py --url "https://frembed.one/embed/movie/218"
